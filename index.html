<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; frame-ancestors 'none';">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="description"
    content="Track your daily calorie intake with this beautiful, easy-to-use calorie tracker. Set goals, log meals, and monitor your nutrition.">
  <title>CalorieFlow — Smart Calorie Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">

    <!-- Header goes here-->
    <header class="app-header">
      <div class="header-content">
        <div class="logo-group">
          <div class="logo-icon" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M14 2C13 2 11.5 4 11 6C10.5 8 11 10 12 12C10 10.5 7 9 5 9C3 9 2 10.5 2 12C2 16 6 20 10 23C11.5 24.2 13 25.5 14 26C15 25.5 16.5 24.2 18 23C22 20 26 16 26 12C26 10.5 25 9 23 9C21 9 18 10.5 16 12C17 10 17.5 8 17 6C16.5 4 15 2 14 2Z"
                fill="url(#flame-grad)" />
              <defs>
                <linearGradient id="flame-grad" x1="14" y1="2" x2="14" y2="26" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#FF6B6B" />
                  <stop offset="0.5" stop-color="#FF8E53" />
                  <stop offset="1" stop-color="#FFC857" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1 class="logo-text">CalorieFlow</h1>
        </div>
        <div class="date-display" id="date-display"></div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Stats Dashboard -->
      <section class="stats-dashboard" aria-label="Daily calorie statistics">
        <div class="calorie-ring-card">
          <div class="ring-container">
            <svg class="progress-ring" width="200" height="200" viewBox="0 0 200 200">
              <circle class="ring-bg" cx="100" cy="100" r="85" fill="none" stroke-width="12" />
              <circle class="ring-progress" id="ring-progress" cx="100" cy="100" r="85" fill="none" stroke-width="12"
                stroke-linecap="round" transform="rotate(-90 100 100)" />
            </svg>
            <div class="ring-center">
              <span class="ring-remaining" id="ring-remaining">0</span>
              <span class="ring-label">remaining</span>
            </div>
          </div>
          <div class="stats-row">
            <div class="stat-item">
              <span class="stat-value" id="stat-consumed">0</span>
              <span class="stat-label">Consumed</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <span class="stat-value" id="stat-goal">2000</span>
              <span class="stat-label">Goal</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <span class="stat-value" id="stat-meals">0</span>
              <span class="stat-label">Meals</span>
            </div>
          </div>
        </div>

        <!-- Macro Cards -->
        <div class="macro-cards">
          <div class="macro-card macro-protein">
            <div class="macro-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2" fill="none" />
                <path d="M7 10L9 12L13 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </div>
            <span class="macro-value" id="macro-protein">0g</span>
            <span class="macro-label">Protein</span>
            <div class="macro-bar">
              <div class="macro-bar-fill" id="protein-bar" style="width: 0%"></div>
            </div>
          </div>
          <div class="macro-card macro-carbs">
            <div class="macro-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <rect x="3" y="3" width="14" height="14" rx="3" stroke="currentColor" stroke-width="2" fill="none" />
                <path d="M7 10H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </div>
            <span class="macro-value" id="macro-carbs">0g</span>
            <span class="macro-label">Carbs</span>
            <div class="macro-bar">
              <div class="macro-bar-fill" id="carbs-bar" style="width: 0%"></div>
            </div>
          </div>
          <div class="macro-card macro-fat">
            <div class="macro-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M10 3C10 3 4 9 4 13C4 16.3 6.7 18 10 18C13.3 18 16 16.3 16 13C16 9 10 3 10 3Z"
                  stroke="currentColor" stroke-width="2" fill="none" />
              </svg>
            </div>
            <span class="macro-value" id="macro-fat">0g</span>
            <span class="macro-label">Fat</span>
            <div class="macro-bar">
              <div class="macro-bar-fill" id="fat-bar" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Add Meal Section -->
      <section class="add-meal-section" aria-label="Add a meal">
        <div class="section-header">
          <h2 class="section-title">Add Meal</h2>
          <button class="btn-icon" id="btn-toggle-form" type="button" aria-label="Toggle meal form"
            aria-expanded="false">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <form class="meal-form collapsed" id="meal-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="meal-name" class="form-label">Meal Name</label>
              <input type="text" id="meal-name" class="form-input" placeholder="e.g. Grilled Chicken Salad"
                maxlength="100" required autocomplete="off">
            </div>
            <div class="form-group form-group-small">
              <label for="meal-calories" class="form-label">Calories</label>
              <input type="number" id="meal-calories" class="form-input" placeholder="kcal" min="0" max="10000" required
                autocomplete="off">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group form-group-small">
              <label for="meal-protein" class="form-label">Protein (g)</label>
              <input type="number" id="meal-protein" class="form-input" placeholder="0" min="0" max="1000"
                autocomplete="off">
            </div>
            <div class="form-group form-group-small">
              <label for="meal-carbs" class="form-label">Carbs (g)</label>
              <input type="number" id="meal-carbs" class="form-input" placeholder="0" min="0" max="1000"
                autocomplete="off">
            </div>
            <div class="form-group form-group-small">
              <label for="meal-fat" class="form-label">Fat (g)</label>
              <input type="number" id="meal-fat" class="form-input" placeholder="0" min="0" max="1000"
                autocomplete="off">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="meal-type" class="form-label">Meal Type</label>
              <select id="meal-type" class="form-input form-select">
                <option value="breakfast">🌅 Breakfast</option>
                <option value="lunch">☀️ Lunch</option>
                <option value="dinner">🌙 Dinner</option>
                <option value="snack">🍿 Snack</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn-primary" id="btn-add-meal">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 3V15M3 9H15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            </svg>
            Add Meal
          </button>
        </form>
      </section>

      <!-- Meal Log -->
      <section class="meal-log-section" aria-label="Today's meal log">
        <div class="section-header">
          <h2 class="section-title">Today's Meals</h2>
          <button class="btn-text-danger" id="btn-clear-all" type="button">Clear All</button>
        </div>
        <div class="meal-list" id="meal-list">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon" aria-hidden="true">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2" opacity="0.3" />
                <path d="M24 36C24 36 27 40 32 40C37 40 40 36 40 36" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" opacity="0.4" />
                <circle cx="24" cy="28" r="2" fill="currentColor" opacity="0.4" />
                <circle cx="40" cy="28" r="2" fill="currentColor" opacity="0.4" />
              </svg>
            </div>
            <p class="empty-text">No meals logged yet today</p>
            <p class="empty-subtext">Tap the + button above to add your first meal</p>
          </div>
        </div>
      </section>

      <!-- Goal Settings -->
      <section class="goal-section" aria-label="Calorie goal settings">
        <div class="section-header">
          <h2 class="section-title">Daily Goal</h2>
        </div>
        <div class="goal-card">
          <div class="goal-input-group">
            <label for="goal-input" class="form-label">Calorie Target</label>
            <div class="goal-input-wrap">
              <input type="number" id="goal-input" class="form-input goal-input" value="2000" min="500" max="10000"
                autocomplete="off">
              <span class="goal-unit">kcal</span>
            </div>
          </div>
          <div class="goal-presets">
            <button type="button" class="preset-btn" data-value="1500">1500</button>
            <button type="button" class="preset-btn active" data-value="2000">2000</button>
            <button type="button" class="preset-btn" data-value="2500">2500</button>
            <button type="button" class="preset-btn" data-value="3000">3000</button>
          </div>
          <button type="button" class="btn-secondary" id="btn-save-goal">Save Goal</button>
        </div>
      </section>

      <!-- Weekly Overview -->
      <section class="weekly-section" aria-label="Weekly calorie overview">
        <div class="section-header">
          <h2 class="section-title">This Week</h2>
        </div>
        <div class="weekly-chart" id="weekly-chart"></div>
      </section>

    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <div class="modal-card">
        <h3 class="modal-title" id="modal-title">Confirm</h3>
        <p class="modal-message" id="modal-message"></p>
        <div class="modal-actions">
          <button type="button" class="btn-secondary modal-cancel" id="modal-cancel">Cancel</button>
          <button type="button" class="btn-danger modal-confirm" id="modal-confirm">Confirm</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>

</html>
